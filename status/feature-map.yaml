app_id: vdapp32-founder-os
last_updated: 2026-04-03

surfaces:
  - route: /
    feature: Founder dashboard
    status: live
    notes: Subject overview across the full Founder OS taxonomy with progress and readiness states.

  - route: /[subject]
    feature: Subject overview
    status: live
    notes: Classic subject front by default, with restored academy-style experiences for Marketing, Sales, and AI Engineering and a shared classic presentation for the remaining subjects.

  - route: /[subject]/v2
    feature: Secondary generic subject overview
    status: live
    notes: Preserves the newer Founder OS operator-first shell without replacing the restored classic subject fronts.

  - route: /[subject]/playbooks
    feature: Playbook library
    status: live
    notes: Operational playbooks for immediate founder actions.

  - route: /[subject]/systems
    feature: Systems library
    status: live
    notes: Repeatable operating cadences and business systems.

  - route: /[subject]/tools
    feature: Tool explorer
    status: live
    notes: Subject-specific tools grouped by category with detail pages.

  - route: /[subject]/learn/modules
    feature: Learning modules
    status: live
    notes: Structured module and lesson flows inside each subject.

  - route: /[subject]/projects
    feature: Projects
    status: live
    notes: Hands-on application layer for subjects that include project content.

  - route: /[subject]/[deepDiveSlug]
    feature: Manifest-driven deep dives
    status: live
    notes: Shared deep dives like toolkit, blueprint, and day-in-the-life plus subject-specific deep pages such as ops, automations, and RAG.

supporting_capabilities:
  - name: Manifest-driven subject discovery
    status: live
    notes: Subjects are registered by manifest.json and rendered without hardcoded lists.

  - name: Subject-scoped progress store
    status: live
    notes: Completion state is namespaced per subject in a single local persistence key.

  - name: Manifest-driven deep-dive registry
    status: live
    notes: Navigation and route generation use manifest deepDivePages plus the subject presentation registry so classic aliases like learning-map, timeline, and blueprint variants resolve cleanly.

  - name: Operator content model
    status: live
    notes: Playbooks, systems, templates, prompts, and domain meta now exist across all 15 subjects, with the most bespoke depth still concentrated in Marketing, Sales, and AI Engineering.

  - name: Wave 1 content depth
    status: live
    notes: Wave 1 thresholds remain complete across Marketing, Sales, Strategy, and Finance; the deepening wave now extends structured baseline depth across the rest of the business-native subjects and restores flagship classic fronts.
